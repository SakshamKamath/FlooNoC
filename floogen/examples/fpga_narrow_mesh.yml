name: "fpga_narrow_mesh"
description: "flit configuration for narrow-only AXI4 interfaces"

routing:
  route_algo: "XY"
  use_id_table: true
  addr_offset_bits: 16
  num_id_bits: 3
  num_x_bits: 3
  num_y_bits: 3

protocols:
  - name: "axi"
    type: "AXI4"
    direction: "manager"
    data_width: 64
    addr_width: 64
    id_width: 5
    user_width: 4
  - name: "axi"
    type: "AXI4"
    direction: "subordinate"
    data_width: 64
    addr_width: 64
    id_width: 5
    user_width: 4

endpoints:
  - name: "cluster"
    array: [2, 2]
    addr_range:
      base: 0x0000_0000_B000_0000
      size: 0x0000_0000_0000_2000
    mgr_port_protocol:
      - "axi"
    sbr_port_protocol:
      - "axi"
    id_offset:
      x: 0
      y: 0

routers:
  - name: "router"
    array: [2, 2]
    auto_connect: true

connections:
  - src: "cluster"
    dst: "router"
    src_range:
    - [0, 1]
    - [0, 1]
    dst_range:
    - [0, 1]
    - [0, 1]
    bidirectional: true
